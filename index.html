<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitTrack – Workout Logger</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">💪 FitTrack</div>
    <ul class="nav-links">
      <li><a href="#log">Log Workout</a></li>
      <li><a href="#history">History</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <h1>Track Your Fitness Journey</h1>
    <p>Log workouts, monitor progress, stay consistent.</p>
  </header>

  <!-- MAIN -->
  <main class="container">

    <!-- TOAST MESSAGE -->
    <div id="toast" class="toast hidden"></div>

    <!-- LOG WORKOUT FORM -->
    <section id="log" class="card">
      <h2>Log a Workout</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Exercise Name</label>
          <input type="text" id="exercise" placeholder="e.g. Running"/>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="category">
            <option value="">Select category</option>
            <option>Cardio</option>
            <option>Strength</option>
            <option>Flexibility</option>
            <option>HIIT</option>
            <option>Sports</option>
          </select>
        </div>
        <div class="form-group">
          <label>Duration (mins)</label>
          <input type="number" id="duration" placeholder="30" min="1"/>
        </div>
        <div class="form-group">
          <label>Calories Burned</label>
          <input type="number" id="calories" placeholder="200" min="1"/>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="date"/>
        </div>
        <div class="form-group full-width">
          <label>Notes (optional)</label>
          <textarea id="notes" rows="2" placeholder="How did it go?"></textarea>
        </div>
      </div>
      <button id="submitBtn" class="btn-primary" onclick="submitWorkout()">➕ Add Workout</button>
    </section>

    <!-- WORKOUT HISTORY -->
    <section id="history" class="card">
      <h2>Workout History</h2>
      <div id="workoutList" class="workout-list">
        <p class="empty-state">No workouts logged yet. Start tracking!</p>
      </div>
    </section>

  </main>

  <!-- EDIT MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h3>Edit Workout</h3>
      <input type="hidden" id="editId"/>
      <div class="form-grid">
        <div class="form-group">
          <label>Exercise</label>
          <input type="text" id="editExercise"/>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="editCategory">
            <option>Cardio</option><option>Strength</option>
            <option>Flexibility</option><option>HIIT</option><option>Sports</option>
          </select>
        </div>
        <div class="form-group">
          <label>Duration (mins)</label>
          <input type="number" id="editDuration"/>
        </div>
        <div class="form-group">
          <label>Calories</label>
          <input type="number" id="editCalories"/>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="editDate"/>
        </div>
        <div class="form-group full-width">
          <label>Notes</label>
          <textarea id="editNotes" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="updateWorkout()">💾 Save</button>
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 FitTrack. Built with 💪 and Node.js.</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
